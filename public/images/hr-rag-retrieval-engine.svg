<svg width="100%" viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Hybrid retrieval engine: a question is embedded and run through both BM25 keyword search and Vertex AI vector search in parallel; their ranked results are merged by Reciprocal Rank Fusion and passed to Gemini, producing a grounded, cited answer.">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Question -->
  <rect x="280" y="20" width="160" height="50" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="360" y="41" text-anchor="middle" fill="#F1F5F9" font-size="14" font-weight="600">Question</text>
  <text x="360" y="59" text-anchor="middle" fill="#94A3B8" font-size="11.5">natural language</text>

  <!-- split down to two searches -->
  <path d="M360 70 L360 92 L170 92 L170 120" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M360 70 L360 92 L550 92 L550 120" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- BM25 -->
  <rect x="70" y="120" width="200" height="64" rx="8" fill="#1E293B" stroke="#3B82F6"/>
  <text x="170" y="143" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">BM25 keyword search</text>
  <text x="170" y="162" text-anchor="middle" fill="#93C5FD" font-size="11.5">exact terms, policy codes</text>
  <text x="170" y="177" text-anchor="middle" fill="#64748B" font-size="10.5">in-process · zero added latency</text>

  <!-- Vector -->
  <rect x="450" y="120" width="200" height="64" rx="8" fill="#1E293B" stroke="#3B82F6"/>
  <text x="550" y="143" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">Vector search</text>
  <text x="550" y="162" text-anchor="middle" fill="#93C5FD" font-size="11.5">semantic meaning</text>
  <text x="550" y="177" text-anchor="middle" fill="#64748B" font-size="10.5">Vertex AI · 3072-dim embeddings</text>

  <!-- both into RRF -->
  <path d="M170 184 L170 220 L300 220" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>
  <path d="M550 184 L550 220 L420 220" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- RRF -->
  <rect x="280" y="226" width="160" height="64" rx="8" fill="#312E81" stroke="#4F46E5"/>
  <text x="360" y="249" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">Reciprocal Rank</text>
  <text x="360" y="266" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">Fusion</text>
  <text x="360" y="282" text-anchor="middle" fill="#C7D2FE" font-size="10.5">merges by rank, not score</text>

  <line x1="360" y1="290" x2="360" y2="320" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Gemini -->
  <rect x="280" y="320" width="160" height="50" rx="8" fill="#134E4A" stroke="#0D9488"/>
  <text x="360" y="341" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">Gemini 2.5 Flash</text>
  <text x="360" y="359" text-anchor="middle" fill="#99F6E4" font-size="11">answers from retrieved context</text>

  <line x1="360" y1="370" x2="360" y2="392" stroke="#64748B" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Answer -->
  <rect x="270" y="392" width="180" height="40" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="360" y="416" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">Grounded answer + citations</text>

  <!-- side labels -->
  <text x="170" y="113" text-anchor="middle" fill="#64748B" font-size="10.5" font-style="italic">precision</text>
  <text x="550" y="113" text-anchor="middle" fill="#64748B" font-size="10.5" font-style="italic">recall</text>
</svg>
