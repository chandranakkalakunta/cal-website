<svg width="100%" viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="HR-RAG query flow architecture: a user query passes through an intent router to either the HR database or hybrid document retrieval (BM25 plus vector search fused by Reciprocal Rank Fusion), producing an answer with sources, while a PII-free logging branch records category metadata to BigQuery.">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Query -->
  <rect x="40" y="250" width="150" height="56" rx="8" fill="#1E293B" stroke="#334155"/>
  <text x="115" y="273" text-anchor="middle" fill="#F1F5F9" font-size="14" font-weight="600">Employee query</text>
  <text x="115" y="292" text-anchor="middle" fill="#94A3B8" font-size="11.5">policy · personal · both</text>

  <line x1="190" y1="278" x2="232" y2="278" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Router -->
  <rect x="232" y="248" width="150" height="60" rx="8" fill="#312E81" stroke="#4F46E5"/>
  <text x="307" y="272" text-anchor="middle" fill="#F1F5F9" font-size="14" font-weight="600">Intent router</text>
  <text x="307" y="291" text-anchor="middle" fill="#C7D2FE" font-size="11.5">detects question type</text>

  <!-- branch up: personal -> HR DB -->
  <path d="M382 265 L430 265 L430 150 L470 150" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="448" y="140" text-anchor="middle" fill="#94A3B8" font-size="11">personal</text>
  <rect x="470" y="122" width="180" height="56" rx="8" fill="#134E4A" stroke="#0D9488"/>
  <text x="560" y="145" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">Cloud SQL — HR DB</text>
  <text x="560" y="163" text-anchor="middle" fill="#99F6E4" font-size="11.5">per-user, isolated</text>

  <!-- branch down: policy -> hybrid retrieval -->
  <path d="M382 291 L410 291 L410 380 L150 380 L150 408" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="430" y="372" text-anchor="middle" fill="#94A3B8" font-size="11">policy / hybrid</text>

  <!-- BM25 -->
  <rect x="60" y="408" width="180" height="52" rx="8" fill="#1E293B" stroke="#3B82F6"/>
  <text x="150" y="430" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">BM25 keyword search</text>
  <text x="150" y="447" text-anchor="middle" fill="#93C5FD" font-size="11.5">exact terms</text>

  <!-- Vector -->
  <rect x="270" y="408" width="200" height="52" rx="8" fill="#1E293B" stroke="#3B82F6"/>
  <text x="370" y="430" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">Vertex AI Vector Search</text>
  <text x="370" y="447" text-anchor="middle" fill="#93C5FD" font-size="11.5">semantic meaning (3072-dim)</text>

  <!-- router also feeds vector: connector from policy line to vector -->
  <line x1="370" y1="380" x2="370" y2="408" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="410" y1="380" x2="410" y2="380" stroke="#64748B" stroke-width="1.5"/>

  <!-- BM25 + Vector -> RRF -->
  <line x1="150" y1="460" x2="150" y2="490" stroke="#64748B" stroke-width="1.5"/>
  <line x1="370" y1="460" x2="370" y2="490" stroke="#64748B" stroke-width="1.5"/>
  <path d="M150 490 L260 490" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <path d="M370 490 L300 490" fill="none" stroke="#64748B" stroke-width="1.5"/>
  <rect x="210" y="490" width="200" height="50" rx="8" fill="#312E81" stroke="#4F46E5"/>
  <text x="310" y="511" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">Reciprocal Rank Fusion</text>
  <text x="310" y="528" text-anchor="middle" fill="#C7D2FE" font-size="11.5">merges both rankings</text>

  <!-- Answer -->
  <rect x="470" y="248" width="180" height="60" rx="8" fill="#134E4A" stroke="#0D9488"/>
  <text x="560" y="272" text-anchor="middle" fill="#F1F5F9" font-size="14" font-weight="600">Answer + sources</text>
  <text x="560" y="291" text-anchor="middle" fill="#99F6E4" font-size="11.5">grounded, cited</text>

  <!-- HR DB -> answer -->
  <path d="M650 150 L690 150 L690 278 L650 278" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>
  <!-- RRF -> answer -->
  <path d="M410 515 L560 515 L560 308" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- BigQuery logging branch (dashed, from answer) -->
  <path d="M560 248 L560 40 L660 40" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#ah)"/>
  <rect x="540" y="14" width="200" height="56" rx="8" fill="#1E293B" stroke="#F59E0B"/>
  <text x="640" y="37" text-anchor="middle" fill="#F1F5F9" font-size="13.5" font-weight="600">BigQuery analytics</text>
  <text x="640" y="55" text-anchor="middle" fill="#FCD34D" font-size="11">SHA-256 IDs + category only · no PII</text>

  <!-- caption for dashed -->
  <text x="455" y="120" text-anchor="middle" fill="#64748B" font-size="10.5" font-style="italic">logging (PII-free)</text>
</svg>
