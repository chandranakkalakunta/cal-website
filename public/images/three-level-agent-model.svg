<svg width="100%" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Three-level agent model with human validation gates">
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Human: notes -->
  <rect x="250" y="20" width="180" height="48" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="340" y="40" text-anchor="middle" fill="#F1F5F9" font-size="15" font-weight="600">Human</text>
  <text x="340" y="58" text-anchor="middle" fill="#94A3B8" font-size="12">rough notes, intent</text>

  <line x1="340" y1="68" x2="340" y2="100" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Level 1 -->
  <rect x="230" y="100" width="220" height="58" rx="8" fill="#312E81" stroke="#4F46E5" stroke-width="1"/>
  <text x="340" y="124" text-anchor="middle" fill="#F1F5F9" font-size="15" font-weight="600">Level 1 — Prompt agent</text>
  <text x="340" y="144" text-anchor="middle" fill="#C7D2FE" font-size="12">notes to full specification</text>

  <line x1="340" y1="158" x2="340" y2="190" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Level 2 -->
  <rect x="230" y="190" width="220" height="58" rx="8" fill="#312E81" stroke="#4F46E5" stroke-width="1"/>
  <text x="340" y="214" text-anchor="middle" fill="#F1F5F9" font-size="15" font-weight="600">Level 2 — Strategist agent</text>
  <text x="340" y="234" text-anchor="middle" fill="#C7D2FE" font-size="12">decompose into phases</text>

  <line x1="340" y1="248" x2="340" y2="280" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Level 3 -->
  <rect x="230" y="280" width="220" height="58" rx="8" fill="#134E4A" stroke="#0D9488" stroke-width="1"/>
  <text x="340" y="304" text-anchor="middle" fill="#F1F5F9" font-size="15" font-weight="600">Level 3 — Working agent</text>
  <text x="340" y="324" text-anchor="middle" fill="#99F6E4" font-size="12">execute phase, summarize</text>

  <line x1="340" y1="338" x2="340" y2="370" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- L2 reviews summary -->
  <rect x="230" y="370" width="220" height="48" rx="8" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1"/>
  <text x="340" y="390" text-anchor="middle" fill="#F1F5F9" font-size="14" font-weight="600">L2 reviews L3 summary</text>
  <text x="340" y="408" text-anchor="middle" fill="#93C5FD" font-size="12">agent-side validation</text>

  <line x1="340" y1="418" x2="340" y2="450" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Human gate (highlighted) -->
  <rect x="226" y="450" width="228" height="58" rx="8" fill="#7C2D12" stroke="#EA580C" stroke-width="2"/>
  <text x="340" y="474" text-anchor="middle" fill="#FFEDD5" font-size="15" font-weight="700">Human validation gate</text>
  <text x="340" y="494" text-anchor="middle" fill="#FED7AA" font-size="12">the step teams skip</text>

  <!-- loop back to L2 -->
  <text x="572" y="476" text-anchor="middle" fill="#94A3B8" font-size="12">approved?</text>
  <path d="M454 479 L560 479 L560 219 L450 219" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="572" y="350" text-anchor="middle" fill="#94A3B8" font-size="12">next phase</text>

  <line x1="340" y1="508" x2="340" y2="540" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- accepted -->
  <rect x="250" y="540" width="180" height="44" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="340" y="566" text-anchor="middle" fill="#F1F5F9" font-size="15" font-weight="600">Phase accepted</text>
</svg>
